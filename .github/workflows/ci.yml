name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Run linting
        run: |
          uv run ruff check src/

      - name: Run tests
        env:
          FORTIMANAGER_HOST: test.example.com
        run: |
          uv run pytest tests/ -v --tb=short --ignore=tests/integration

      - name: Run tests with coverage
        env:
          FORTIMANAGER_HOST: test.example.com
        run: |
          uv run pytest tests/ --cov=src/fortimanager_mcp --cov-report=xml --ignore=tests/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@f2274c2c340e0c81c8f7dc407b2a477b8935f171 # v6
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Check formatting
        run: |
          uv run ruff format --check src/ tests/

      - name: Check linting
        run: |
          uv run ruff check src/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Dependency vulnerability audit (pip-audit) — retry on transient PyPI errors
        # NOTE: pip-audit skips VCS direct references, so the git-pinned pyfmg
        # dependency is out of scope here. pyfmg is tracked manually via its
        # full commit-SHA pin (see SECURITY.md "Dependency auditing").
        run: |
          # pip-audit queries pypi.org which occasionally returns 503 transiently
          # (observed on fortianalyzer-mcp CI 2026-06-11). Retry up to 3 times
          # with 15s backoff before failing the build on a real finding.
          for attempt in 1 2 3; do
            if uv run --with pip-audit -- pip-audit --desc; then
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "::warning::pip-audit attempt $attempt failed (likely transient PyPI error); retrying in 15s"
              sleep 15
            fi
          done
          exit 1

      - name: Static security analysis (bandit)
        run: |
          uv run --with bandit -- bandit -r src/ -ll -ii
